<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drinderr Global Radar</title>
    
    <!-- Стили карты Leaflet -->
    <link rel="stylesheet" href="leaflet.css" />
    
    <!-- Скрипт Telegram SDK -->
    <script src="telegram.js"></script>
    
    <style>
        html, body {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #17212b; color: #f5f5f5;
            display: flex; flex-direction: column; overflow: hidden;
        }
        #map { width: 100%; height: calc(100vh - 120px); background-color: #2b2b2b; }
        .leaflet-control-attribution { display: none !important; }
        
        /* ЖЕСТКИЙ ФИКС ДВОЙНЫХ ПИНОВ: Скрываем стандартные картинки-капли Leaflet из кэша */
        .leaflet-marker-icon:not(.custom-div-icon) { display: none !important; }
        .leaflet-marker-shadow { display: none !important; }
        
        /* Стили для наших текстовых эмодзи-маркеров */
        .custom-div-icon {
            display: block !important;
            background: none !important;
            border: none !important;
        }

        .controls {
            height: 120px; padding: 12px 15px; display: flex;
            flex-direction: column; gap: 8px; background: #202b36;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.3); box-sizing: border-box; z-index: 1000;
        }
        .panel-row { display: flex; gap: 10px; width: 100%; align-items: center; }
        label { font-size: 14px; color: #b0b9c2; white-space: nowrap; }
        select {
            flex: 1; padding: 6px; border-radius: 8px; background: #17212b;
            color: #fff; border: 1px solid #455261; font-size: 14px; outline: none;
        }
        .btn-group { display: flex; gap: 10px; width: 100%; }
        button {
            flex: 1; padding: 10px; border: none; border-radius: 10px;
            font-size: 14px; font-weight: bold; cursor: pointer;
            transition: transform 0.1s; display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        button:active { transform: scale(0.98); }
        button.pin-btn { background: linear-gradient(135deg, #2481cc, #1a65a4); color: #ffffff; }
        button.del-btn { background: linear-gradient(135deg, #e63946, #b21f2d); color: #ffffff; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="controls">
        <div class="panel-row">
            <label for="duration">Время жизни пина:</label>
            <select id="duration">
                <option value="60">1 час</option>
                <option value="180">3 часа</option>
                <option value="720">12 часов</option>
                <option value="1440">24 часа</option>
            </select>
        </div>
        <div class="btn-group">
            <button class="pin-btn" onclick="dropPin()">📍 Поставить пин</button>
            <button class="del-btn" onclick="deletePin()">🗑️ Удалить пин</button>
        </div>
    </div>

    <!-- Загружаем движок карты строго после элементов разметки -->
    <script src="leaflet.js"></script>
    <script>
        let tg = null;
        let currentUserName = "Пользователь";

        if (typeof window !== 'undefined' && window.Telegram && window.Telegram.WebApp) {
            tg = window.Telegram.WebApp;
            tg.ready(); tg.expand();
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                currentUserName = tg.initDataUnsafe.user.first_name || tg.initDataUnsafe.user.username;
            }
        }

        // Базовый центр карты — Санкт-Петербург, лицей №239 [59.9451, 30.3541]
        let map = L.map('map').setView([59.9451, 30.3541], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

        let userCoords = { lat: 59.9451, lng: 30.3541 };

        // Наш единственный чистый эмодзи-маркер
        const myIcon = L.divIcon({
            html: '<div style="font-size: 30px; transform: translate(-10px, -20px);">📍</div>',
            className: 'custom-div-icon'
        });

        // Запрашиваем реальный GPS смартфона
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((position) => {
                userCoords = { lat: position.coords.latitude, lng: position.coords.longitude };
                
                // Плавно перемещаем карту к вашей живой точке в Ольгино
                map.setView([userCoords.lat, userCoords.lng], 16);
                
                // Ставим маркер вашей реальной позиции
                L.marker([userCoords.lat, userCoords.lng], { icon: myIcon }).addTo(map)
                    .bindPopup('Вы здесь 📍').openPopup();
            }, (error) => {
                L.marker([userCoords.lat, userCoords.lng], { icon: myIcon }).addTo(map)
                    .bindPopup('Лицей №239 (GPS недоступен)').openPopup();
            }, { enableHighAccuracy: true });
        }

        // Рендеринг активных пинов других участников
        if (tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param) {
            try {
                let allPins = JSON.parse(atob(tg.initDataUnsafe.start_param.replace(/-/g, '+').replace(/_/g, '/')));
                allPins.forEach(p => {
                    // Рисуем маркеры только для чужих аккаунтов (убираем дублирование)
                    if (p.name !== currentUserName) {
                        let userIcon = L.divIcon({
                            html: `<div style="font-size: 30px; transform: translate(-10px, -20px);">👤</div>`,
                            className: 'custom-div-icon'
                        });
                        L.marker([p.lat, p.lng], { icon: userIcon }).addTo(map)
                            .bindPopup(`<b>Пользователь:</b> ${p.name}<br><b>Исчезнет в:</b> ${p.until}`);
                    }
                });
            } catch(e) { console.log("Ошибка парсинга пинов", e); }
        }

        // Функция отправки пина
        window.dropPin = function() {
            const minutes = document.getElementById('duration').value;
            const data = {
                action: "set_pin",
                lat: userCoords.lat,
                lng: userCoords.lng,
                duration: parseInt(minutes)
            };

            if (tg && tg.sendData) {
                tg.sendData(JSON.stringify(data));
                tg.close();
            } else {
                alert("Локальный тест:\nПин зафиксирован по GPS: " + userCoords.lat + ", " + userCoords.lng);
            }
        };

        // Функция удаления пина
        window.deletePin = function() {
            const data = { action: "delete_pin" };
            if (tg && tg.sendData) {
                tg.sendData(JSON.stringify(data));
                tg.close();
            } else {
                alert("Запрос на удаление отправлен");
            }
        };
        
        setTimeout(() => { map.invalidateSize(); }, 400);
    </script>
</body>
</html>
