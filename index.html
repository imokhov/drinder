<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drinderr WebApp</title>
    
    <!-- Подключаем официальный скрипт API Яндекс Карт (загружается мгновенно) -->
    <script src="https://yandex.ru" type="text/javascript"></script>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org"></script>
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #17212b;
            color: #f5f5f5;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Контейнер для полноценной интерактивной карты */
        #map {
            width: 100%;
            height: calc(100vh - 80px);
            background-color: #2b2b2b;
        }
        
        .controls {
            height: 80px;
            padding: 15px;
            display: flex;
            gap: 12px;
            background: #202b36;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.3);
            box-sizing: border-box;
            z-index: 1000;
        }
        
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.1s;
        }
        
        button:active {
            transform: scale(0.97);
        }

        button.beer { background: linear-gradient(135deg, #ffb703, #fb8500); color: #000; }
        button.coffee { background: linear-gradient(135deg, #219ebc, #023047); color: #fff; }
    </style>
</head>
<body>

    <!-- Элемент, куда Яндекс загрузит интерактивную карту -->
    <div id="map"></div>

    <div class="controls">
        <button class="beer" onclick="sendCheckin('Пиво 🍻')">🍻 Пиво</button>
        <button class="coffee" onclick="sendCheckin('Кофе ☕')">☕ Кофе</button>
    </div>

    <script type="text/javascript">
        // Инициализируем Telegram WebApp
        let tg = null;
        if (typeof window !== 'undefined' && window.Telegram && window.Telegram.WebApp) {
            tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
        }

        // Координаты центра карты по умолчанию (Москва)
        let userCoords = [55.7558, 37.6173];
        let myMap = null;
        let myPlacemark = null;

        // Ждем загрузки API Яндекс Карт
        ymaps.ready(init);

        function init() {
            // Создаем полноценную карту Яндекса
            myMap = new ymaps.Map("map", {
                center: userCoords,
                zoom: 13,
                controls: ['zoomControl', 'geolocationControl']
            });

            // Пытаемся получить точные координаты через GPS смартфона
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    userCoords = [position.coords.latitude, position.coords.longitude];
                    
                    // Центрируем карту на пользователе
                    myMap.setCenter(userCoords, 15);

                    # Добавляем красивую синюю метку на место, где вы стоите
                    myPlacemark = new ymaps.Placemark(userCoords, {
                        hintContent: 'Вы здесь!',
                        balloonContent: 'Ваше местоположение 📍'
                    }, {
                        preset: 'islands#blueBeerIcon' // Иконка бокала/метки
                    });

                    myMap.geoObjects.add(myPlacemark);
                }, (error) => {
                    // Если GPS выключен — ставим стандартную метку в центре
                    myPlacemark = new ymaps.Placemark(userCoords, {
                        balloonContent: 'GPS отключен. Дефолтная точка.'
                    });
                    myMap.geoObjects.add(myPlacemark);
                }, { enableHighAccuracy: true });
            }
        }

        // Функция отправки чекина обратно в чат вашего бота
        function sendCheckin(drinkType) {
            const data = {
                drink: drinkType,
                lat: userCoords[0],
                lng: userCoords[1]
            };
            
            if (tg && tg.sendData) {
                tg.sendData(JSON.stringify(data));
                tg.close();
            } else {
                alert("Чекин: " + drinkType + "\nКоординаты: " + JSON.stringify(userCoords));
            }
        }
    </script>
</body>
</html>
