<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drinderr Global Radar</title>
    
    <!-- Локальные стили и скрипт Telegram -->
    <link rel="stylesheet" href="leaflet.css" />
    <script src="telegram.js"></script>
    
    <style>
        html, body {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #17212b; color: #f5f5f5;
            display: flex; flex-direction: column; overflow: hidden;
        }
        #map { width: 100%; height: calc(100vh - 120px); background-color: #2b2b2b; }
        .leaflet-control-attribution { display: none !important; }
        
        .controls {
            height: 120px; padding: 12px 15px; display: flex;
            flex-direction: column; gap: 8px; background: #202b36;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.3); box-sizing: border-box; z-index: 1000;
        }
        .panel-row { display: flex; gap: 10px; width: 100%; align-items: center; }
        label { font-size: 14px; color: #b0b9c2; white-space: nowrap; }
        select {
            flex: 1; padding: 6px; border-radius: 8px; background: #17212b;
            color: #fff; border: 1px solid #455261; font-size: 14px; outline: none;
        }
        .btn-group { display: flex; gap: 10px; width: 100%; }
        button {
            flex: 1; padding: 10px; border: none; border-radius: 10px;
            font-size: 14px; font-weight: bold; cursor: pointer;
            transition: transform 0.1s; display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        button:active { transform: scale(0.98); }
        button.pin-btn { background: linear-gradient(135deg, #2481cc, #1a65a4); color: #ffffff; }
        button.del-btn { background: linear-gradient(135deg, #e63946, #b21f2d); color: #ffffff; }
        
        /* Подсказка сверху карты */
        #hint-bar {
            background: #2b394a; padding: 6px; text-align: center;
            font-size: 13px; font-weight: bold; color: #219ebc;
        }
    </style>
</head>
<body>

    <!-- Панель подсказки -->
    <div id="hint-bar">Выберите время внизу и кликните на карту, чтобы сбросить пин!</div>

    <div id="map"></div>

    <div class="controls">
        <div class="panel-row">
            <label for="duration">Время жизни пина:</label>
            <select id="duration">
                <option value="60">1 час</option>
                <option value="180">3 часа</option>
                <option value="720">12 часов</option>
                <option value="1440">24 часа</option>
            </select>
        </div>
        <div class="btn-group">
            <button class="pin-btn" onclick="activatePlacement()">📍 Выбрать точку</button>
            <button class="del-btn" onclick="deletePin()">🗑️ Удалить мой пин</button>
        </div>
    </div>

    <!-- Локальный движок Leaflet -->
    <script src="leaflet.js"></script>
    <script>
        let tg = null;
        if (typeof window !== 'undefined' && window.Telegram && window.Telegram.WebApp) {
            tg = window.Telegram.WebApp;
            tg.ready(); tg.expand();
        }

        // Центрируем карту на дефолтные координаты (Москва)
        let map = L.map('map').setView([55.7558, 37.6173], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

        let isPlacingActive = false;
        let currentUserName = tg && tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user.first_name : "Аноним";

        // Рендеринг пинов остальных участников из параметров запуска
        if (tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param) {
            try {
                let allPins = JSON.parse(atob(tg.initDataUnsafe.start_param.replace(/-/g, '+').replace(/_/g, '/')));
                allPins.forEach(p => {
                    let userIcon = L.divIcon({
                        html: `<div style="font-size: 30px; transform: translate(-10px, -20px);">${p.name === currentUserName ? '📍' : '👤'}</div>`,
                        className: 'custom-div-icon'
                    });
                    L.marker([p.lat, p.lng], { icon: userIcon }).addTo(map)
                        .bindPopup(`<b>Пользователь:</b> ${p.name}<br><b>Исчезнет в:</b> ${p.until}`);
                });
            } catch(e) { console.log("Ошибка парсинга пинов", e); }
        }

        // Включаем режим ожидания клика по карте
        window.activatePlacement = function() {
            isPlacingActive = true;
            document.getElementById('hint-bar').innerText = "👉 Кликните в любое место на карте!";
            document.getElementById('hint-bar').style.color = "#ffb703";
        };

        // Ловим клик пользователя по интерактивной карте
        map.on('click', function(e) {
            if (!isPlacingActive) return;
            
            const lat = e.latlng.lat;
            const lng = e.latlng.lng;
            const minutes = document.getElementById('duration').value;

            // Ставим маркер визуально
            const tempIcon = L.divIcon({
                html: '<div style="font-size: 30px; transform: translate(-10px, -20px);">📍</div>',
                className: 'custom-div-icon'
            });
            L.marker([lat, lng], { icon: tempIcon }).addTo(map).bindPopup('Сохраняю пин...').openPopup();

            // Собираем пакет данных для бота
            const data = {
                action: "set_pin",
                lat: lat,
                lng: lng,
                duration: parseInt(minutes)
            };

            // Отправляем пакет напрямую в чат силами Telegram
            if (tg && tg.sendData) {
                setTimeout(() => {
                    tg.sendData(JSON.stringify(data));
                    tg.close();
                }, 600);
            } else {
                alert("ПК Тест:\nКоординаты клика: " + lat + ", " + lng);
            }
        });

        // Клик «Удалить пин»
        window.deletePin = function() {
            const data = { action: "delete_pin" };
            if (tg && tg.sendData) {
                tg.sendData(JSON.stringify(data));
                tg.close();
            } else {
                alert("Запрос на удаление отправлен");
            }
        };
        
        setTimeout(() => { map.invalidateSize(); }, 400);
    </script>
</body>
</html>
