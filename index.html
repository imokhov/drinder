<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drinderr Live Map</title>
    
    <!-- 1. ПОДКЛЮЧАЕМ ЛОКАЛЬНЫЕ СТИЛИ (Без внешних доменов и блокировок ORB) -->
    <link rel="stylesheet" href="leaflet.css" />
    
    <!-- Telegram WebApp SDK -->
    <script src="telegram.js"></script>
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #17212b;
            color: #f5f5f5;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Контейнер для настоящей интерактивной карты */
        #map {
            width: 100%;
            height: calc(100vh - 80px);
            background-color: #2b2b2b;
        }
        
        .controls {
            height: 80px;
            padding: 15px;
            display: flex;
            gap: 12px;
            background: #202b36;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.3);
            box-sizing: border-box;
            z-index: 1000;
        }
        
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.1s;
        }
        
        button:active {
            transform: scale(0.97);
        }

        button.beer { background: linear-gradient(135deg, #ffb703, #fb8500); color: #000; }
        button.coffee { background: linear-gradient(135deg, #219ebc, #023047); color: #fff; }
    </style>
</head>
<body>

    <!-- Живая интерактивная карта -->
    <div id="map"></div>

    <div class="controls">
        <button class="beer" onclick="sendCheckin('Пиво 🍻')">🍻 Пиво</button>
        <button class="coffee" onclick="sendCheckin('Кофе ☕')">☕ Кофе</button>
    </div>

    <!-- 2. ПОДКЛЮЧАЕМ ЛОКАЛЬНЫЙ ДВИЖОК КАРТЫ (Защита ORB пропустит его, так как он родной) -->
    <script src="leaflet.js"></script>
    <script>
        let tg = null;
        if (typeof window !== 'undefined' && window.Telegram && window.Telegram.WebApp) {
            tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
        }

        // Координаты центра по умолчанию (Москва)
        let userCoords = [55.7558, 37.6173];

        // Запуск интерактивной карты
        const map = L.map('map').setView(userCoords, 12);
        
        // Загружаем тайлы OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19
        }).addTo(map);

        // Получаем реальные координаты GPS
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((position) => {
                userCoords = [position.coords.latitude, position.coords.longitude];
                map.setView(userCoords, 15);
            }, (error) => {
                console.log("GPS отключен на устройстве");
            });
        }

        function sendCheckin(drinkType) {
            const data = {
                drink: drinkType,
                lat: userCoords[0],
                lng: userCoords[1]
            };
            if (tg && tg.sendData) {
                tg.sendData(JSON.stringify(data));
                tg.close();
            } else {
                alert("Чекин: " + drinkType + "\nКоординаты: " + JSON.stringify(userCoords));
            }
        }
    </script>
</body>
</html>
