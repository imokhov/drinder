<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drinderr WebApp</title>
    
    <!-- Подключаем только Telegram SDK, он легкий и встроен в сам мессенджер -->
    <script src="https://telegram.org"></script>
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #17212b;
            color: #f5f5f5;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Интерактивная карта во весь экран */
        #map-frame {
            width: 100%;
            height: calc(100vh - 80px);
            border: none;
            background-color: #2b2b2b;
        }
        
        .controls {
            height: 80px;
            padding: 15px;
            display: flex;
            gap: 12px;
            background: #202b36;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.3);
            box-sizing: border-box;
            z-index: 1000;
        }
        
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.1s;
        }
        
        button:active {
            transform: scale(0.97);
        }

        button.beer { background: linear-gradient(135deg, #ffb703, #fb8500); color: #000; }
        button.coffee { background: linear-gradient(135deg, #219ebc, #023047); color: #fff; }
    </style>
</head>
<body>

    <!-- Встраиваем карту напрямую без тяжелых JS библиотек -->
    <iframe id="map-frame" src="https://openstreetmap.org"></iframe>

    <div class="controls">
        <button class="beer" onclick="sendCheckin('Пиво 🍻')">🍻 Пиво</button>
        <button class="coffee" onclick="sendCheckin('Кофе ☕')">☕ Кофе</button>
    </div>

    <script>
        // Инициализируем Telegram WebApp
        let tg = null;
        if (typeof window !== 'undefined' && window.Telegram && window.Telegram.WebApp) {
            tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
        }

        // Координаты по умолчанию (Москва)
        let userCoords = { lat: 55.7558, lng: 37.6173 };

        // Запрашиваем реальный GPS смартфона для отправки другу
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((position) => {
                userCoords = {
                    lat: position.coords.latitude,
                    lng: position.coords.longitude
                };
                
                // Пересчитываем границы карты iframe под локацию пользователя
                const offset = 0.01; 
                const minLon = userCoords.lng - offset;
                const minLat = userCoords.lat - offset;
                const maxLon = userCoords.lng + offset;
                const maxLat = userCoords.lat + offset;
                
                // Обновляем карту на экране под ваши реальные координаты
                document.getElementById('map-frame').src = `https://openstreetmap.org{minLon}%2C${minLat}%2C${maxLon}%2C${maxLat}&layer=mapnik&marker=${userCoords.lat}%2C${userCoords.lng}`;
            }, (error) => {
                console.log("GPS недоступен, показываем дефолтную карту");
            }, { enableHighAccuracy: true });
        }

        // Функция отправки чекина в бот
        function sendCheckin(drinkType) {
            const data = {
                drink: drinkType,
                lat: userCoords.lat,
                lng: userCoords.lng
            };
            
            if (tg && tg.sendData) {
                tg.sendData(JSON.stringify(data));
                tg.close();
            } else {
                alert("Чекин: " + drinkType + "\nКоординаты: " + JSON.stringify(userCoords));
            }
        }
    </script>
</body>
</html>
