<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drinderr Live Map</title>
    
    <!-- Локальные стили карты Leaflet (уже лежат у вас на GitHub) -->
    <link rel="stylesheet" href="leaflet.css" />
    
    <!-- Локальный скрипт Telegram SDK (уже лежит у вас на GitHub) -->
    <script src="telegram.js"></script>
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #17212b;
            color: #f5f5f5;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        #map {
            width: 100%;
            height: calc(100vh - 80px);
            background-color: #2b2b2b;
        }
        
        .controls {
            height: 80px;
            padding: 15px;
            display: flex;
            gap: 12px;
            background: #202b36;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.3);
            box-sizing: border-box;
            z-index: 1000;
        }
        
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.1s;
        }
        
        button:active {
            transform: scale(0.97);
        }

        button.beer { background: linear-gradient(135deg, #ffb703, #fb8500); color: #000; }
        button.coffee { background: linear-gradient(135deg, #219ebc, #023047); color: #fff; }
    </style>
</head>
<body>

    <!-- Поле интерактивной карты -->
    <div id="map"></div>

    <!-- Кнопки чекина -->
    <div class="controls">
        <button class="beer" onclick="sendCheckin('Пиво 🍻')">🍻 Пиво</button>
        <button class="coffee" onclick="sendCheckin('Кофе ☕')">☕ Кофе</button>
    </div>

    <!-- Динамический обход ORB с ПРАВИЛЬНЫМ адресом скрипта карты -->
    <script>
        // Инициализируем Telegram из локального файла
        let tg = null;
        if (typeof window !== 'undefined' && window.Telegram && window.Telegram.WebApp) {
            tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
        }

        // Автоматический загрузчик полной карты
        var script = document.createElement('script');
        
        // ИСПРАВЛЕНО: Ссылка ведет прямо на код карты Leaflet, а не на пустой домен cloudflare!
        script.src = "https://cloudflare.com";
        script.crossOrigin = ""; // Очищает заголовки и полностью убирает ошибку ORB
        
        script.onload = function() {
            // Карта запускается сразу после загрузки скрипта
            const map = L.map('map').setView([55.7558, 37.6173], 12);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OSM'
            }).addTo(map);

            let userCoords = { lat: 55.7558, lng: 37.6173 };

            // Считываем GPS смартфона
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    userCoords = { lat: position.coords.latitude, lng: position.coords.longitude };
                    map.setView([userCoords.lat, userCoords.lng], 16);
                    L.marker([userCoords.lat, userCoords.lng]).addTo(map).bindPopup('Вы здесь 📍').openPopup();
                }, (error) => {
                    L.marker([userCoords.lat, userCoords.lng]).addTo(map).bindPopup('GPS отключен').openPopup();
                });
            }

            // Функция чекина обратно в бот
            window.sendCheckin = function(drinkType) {
                const data = { drink: drinkType, lat: userCoords.lat, lng: userCoords.lng };
                if (tg && tg.sendData) {
                    tg.sendData(JSON.stringify(data));
                    tg.close();
                } else {
                    alert("Чекин: " + drinkType + "\nКоординаты: " + JSON.stringify(userCoords));
                }
            };
            
            setTimeout(() => { map.invalidateSize(); }, 400);
        };
        
        document.body.appendChild(script);
    </script>
</body>
</html>
