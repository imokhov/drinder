<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beer Buddy WebApp</title>
    
    <!-- Стили карты загружаются из гарантированно доступного источника -->
    <link rel="stylesheet" href="https://yastatic.net" />
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org"></script>
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #17212b;
            color: #f5f5f5;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        #map {
            width: 100%;
            height: calc(100vh - 80px);
            background-color: #e5e3df;
        }
        
        .controls {
            height: 80px;
            padding: 15px;
            display: flex;
            gap: 12px;
            background: #202b36;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.3);
            box-sizing: border-box;
            z-index: 1000;
        }
        
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button.beer { background: linear-gradient(135deg, #ffb703, #fb8500); color: #000; }
        button.coffee { background: linear-gradient(135deg, #219ebc, #023047); color: #fff; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="controls">
        <button class="beer" onclick="sendCheckin('Пиво 🍻')">🍻 Пиво</button>
        <button class="coffee" onclick="sendCheckin('Кофе ☕')">☕ Кофе</button>
    </div>

    <!-- Движок карты загружается напрямую через сервера Яндекса -->
    <script src="https://yastatic.net"></script>
    <script>
        let tg = null;
        if (typeof window !== 'undefined' && window.Telegram && window.Telegram.WebApp) {
            tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
        }

        // Если Leaflet успешно загружен с Яндекса
        if (typeof L !== 'undefined') {
            const map = L.map('map').setView([55.7558, 37.6173], 12);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap'
            }).addTo(map);

            let userCoords = { lat: 55.7558, lng: 37.6173 };

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    userCoords = { lat: position.coords.latitude, lng: position.coords.longitude };
                    map.setView([userCoords.lat, userCoords.lng], 16);
                    L.marker([userCoords.lat, userCoords.lng]).addTo(map).bindPopup('Вы здесь 📍').openPopup();
                }, (error) => {
                    L.marker([userCoords.lat, userCoords.lng]).addTo(map).bindPopup('Дефолтная точка (GPS недоступен)').openPopup();
                }, { enableHighAccuracy: true });
            }

            window.sendCheckin = function(drinkType) {
                const data = { drink: drinkType, lat: userCoords.lat, lng: userCoords.lng };
                if (tg && tg.sendData) {
                    tg.sendData(JSON.stringify(data));
                    tg.close();
                } else {
                    alert("Тест на ПК:\nЧекин: " + drinkType + "\nКоординаты: " + JSON.stringify(userCoords));
                }
            };

            setTimeout(() => { map.invalidateSize(); }, 400);
        } else {
            // Аварийный режим без карты — кнопки в любом случае будут работать!
            document.getElementById('map').innerHTML = "<div style='padding:40px; text-align:center; font-size:18px;'>🗺️ Карта недоступна в обычном браузере.<br><br>Кнопки ниже активны! Запустите бота, чтобы протестировать на телефоне.</div>";
            
            let userCoords = { lat: 55.7558, lng: 37.6173 };
            window.sendCheckin = function(drinkType) {
                const data = { drink: drinkType, lat: userCoords.lat, lng: userCoords.lng };
                if (tg && tg.sendData) {
                    tg.sendData(JSON.stringify(data));
                    tg.close();
                } else {
                    alert("Чекин: " + drinkType);
                }
            };
        }
    </script>
</body>
</html>
