<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drinderr Global Radar</title>
    
    <link rel="stylesheet" href="leaflet.css" />
    <script src="telegram.js"></script>
    
    <style>
        html, body {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #17212b; color: #f5f5f5;
            display: flex; flex-direction: column; overflow: hidden;
        }
        #map { width: 100%; height: calc(100vh - 120px); background-color: #2b2b2b; }
        .leaflet-control-attribution { display: none !important; }
        
        img.leaflet-marker-icon, .leaflet-marker-shadow { display: none !important; }
        .custom-marker { display: block !important; background: none !important; border: none !important; }

        .controls {
            height: 120px; padding: 12px 15px; display: flex;
            flex-direction: column; gap: 8px; background: #202b36;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.3); box-sizing: border-box; z-index: 1000;
        }
        .panel-row { display: flex; gap: 10px; width: 100%; align-items: center; }
        label { font-size: 14px; color: #b0b9c2; white-space: nowrap; }
        select {
            flex: 1; padding: 6px; border-radius: 8px; background: #17212b;
            color: #fff; border: 1px solid #455261; font-size: 14px; outline: none;
        }
        .btn-group { display: flex; gap: 10px; width: 100%; }
        button {
            flex: 1; padding: 10px; border: none; border-radius: 10px;
            font-size: 14px; font-weight: bold; cursor: pointer; color: #ffffff;
            transition: transform 0.1s; display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        button:active { transform: scale(0.98); }
        button.pin-btn { background: linear-gradient(135deg, #2481cc, #1a65a4); }
        button.del-btn { background: linear-gradient(135deg, #e63946, #b21f2d); }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="controls">
        <div class="panel-row">
            <label for="duration">Время жизни пина:</label>
            <select id="duration">
                <option value="60">1 час</option>
                <option value="180">3 часа</option>
                <option value="720">12 часов</option>
                <option value="1440">24 часа</option>
            </select>
        </div>
        <div class="btn-group">
            <button class="pin-btn" onclick="dropPinNative()">📍 Поставить пин</button>
            <button class="del-btn" onclick="deletePinNative()">🗑️ Удалить пин</button>
        </div>
    </div>

    <script src="leaflet.js"></script>
    <script>
        let tg = null;
        if (typeof window !== 'undefined' && window.Telegram && window.Telegram.WebApp) {
            tg = window.Telegram.WebApp;
            tg.ready(); tg.expand();
        }

        // Центр — Санкт-Петербург, Лицей №239 по умолчанию
        let map = L.map('map', { markerZoomAnimation: false }).setView([59.9451, 30.3541], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

        let userCoords = { lat: 59.9451, lng: 30.3541 };

        const myIcon = L.divIcon({
            html: '<div style="font-size: 32px; transform: translate(-12px, -24px);">📍</div>',
            className: 'custom-marker'
        });

        // ИСПРАВЛЕНО: Сразу при старте запрашиваем НАТИВНЫЙ GPS у самого Telegram в обход блокировок браузера!
        if (tg && tg.Location && tg.Location.getLocation) {
            tg.Location.getLocation((data) => {
                if (data && data.latitude) {
                    userCoords = { lat: data.latitude, lng: data.longitude };
                    map.setView([userCoords.lat, userCoords.lng], 16);
                    L.marker([userCoords.lat, userCoords.lng], { icon: myIcon }).addTo(map)
                        .bindPopup('Вы здесь 📍').openPopup();
                }
            });
        }

        // Рендеринг пинов остальных участников из стартовых параметров ссылки
        if (tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param) {
            try {
                let allPins = JSON.parse(atob(tg.initDataUnsafe.start_param.replace(/-/g, '+').replace(/_/g, '/')));
                let currentUserName = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.first_name : "Пользователь";
                
                allPins.forEach(p => {
                    if (p.name !== currentUserName) {
                        let userIcon = L.divIcon({
                            html: `<div style="font-size: 30px; transform: translate(-10px, -20px);">👤</div>`,
                            className: 'custom-marker'
                        });
                        L.marker([p.lat, p.lng], { icon: userIcon }).addTo(map)
                            .bindPopup(`<b>Пользователь:</b> ${p.name}<br><b>Исчезнет в:</b> ${p.until}`);
                    }
                });
            } catch(e) { console.log(e); }
        }

        // ИСПРАВЛЕНО: Отправка через нативный Inline Query — работает в ЛЮБЫХ режимах запуска Mini App!
        window.dropPinNative = function() {
            const minutes = document.getElementById('duration').value;
            // Передаем команду боту
            const queryStr = `set_pin:${userCoords.lat.toFixed(5)}:${userCoords.lng.toFixed(5)}:${minutes}`;
            if (tg) {
                tg.switchInlineQuery(queryStr, ["users", "chats", "bots"]);
                tg.close();
            } else {
                alert("ПК тест: " + queryStr);
            }
        };

        window.deletePinNative = function() {
            if (tg) {
                tg.switchInlineQuery("delete_pin", ["users", "chats", "bots"]);
                tg.close();
            }
        };
        
        setTimeout(() => { map.invalidateSize(); }, 400);
    </script>
</body>
</html>
