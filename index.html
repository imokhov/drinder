<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drinderr Debug Radar</title>
    
    <link rel="stylesheet" href="leaflet.css" />
    <script src="telegram.js"></script>
    
    <style>
        html, body {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #17212b; color: #f5f5f5;
            display: flex; flex-direction: column; overflow: hidden;
        }
        #map { width: 100%; height: calc(100vh - 160px); background-color: #2b2b2b; }
        .leaflet-control-attribution { display: none !important; }
        
        /* ВРЕМЕННО: Возвращаем вообще все маркеры и стили Leaflet по умолчанию, 
           чтобы исключить ошибку скрытия */
        .leaflet-marker-icon, .leaflet-marker-shadow { display: block !important; }

        /* Панель логов и кнопок */
        .controls {
            height: 160px; padding: 10px 15px; display: flex;
            flex-direction: column; gap: 8px; background: #202b36;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.3); box-sizing: border-box; z-index: 1000;
        }
        
        /* Окно терминала для вывода ошибок */
        #debug-console {
            background: #17212b; border: 1px solid #455261;
            border-radius: 8px; height: 55px; padding: 6px;
            font-family: monospace; font-size: 11px; color: #4ad66d;
            overflow-y: auto; white-space: pre-wrap; word-break: break-all;
        }

        .btn-group { display: flex; gap: 10px; width: 100%; }
        button {
            flex: 1; padding: 12px; border: none; border-radius: 10px;
            font-size: 14px; font-weight: bold; cursor: pointer; color: #ffffff;
        }
        button.pin-btn { background: #2481cc; }
        button.del-btn { background: #e63946; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="controls">
        <!-- Экран отладки для смартфона -->
        <div id="debug-console">Инициализация логгера...</div>
        
        <div class="btn-group">
            <button class="pin-btn" onclick="dropPinDebug()">📍 ПОСТАВИТЬ</button>
            <button class="del-btn" onclick="deletePinDebug()">🗑️ УДАЛИТЬ</button>
        </div>
    </div>

    <script src="leaflet.js"></script>
    <script>
        const consoleEl = document.getElementById('debug-console');
        
        // Функция для вывода текста на экран телефона
        function log(msg) {
            consoleEl.innerText = `[${new Date().toLocaleTimeString()}] ${msg}\n` + consoleEl.innerText;
            console.log(msg);
        }

        log("Логгер готов. Проверяю Telegram SDK...");

        let tg = null;
        if (typeof window !== 'undefined' && window.Telegram && window.Telegram.WebApp) {
            tg = window.Telegram.WebApp;
            tg.ready(); tg.expand();
            log(`TG OK. User: ${tg.initDataUnsafe?.user?.first_name || 'Не найден'}`);
        } else {
            log("TG SDK не обнаружен!");
        }

        // Старт на Лицее 239
        let map;
        try {
            map = L.map('map').setView([59.9451, 30.3541], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
            log("Карта Leaflet инициализирована успешно.");
        } catch(err) {
            log(`КРИТИЧЕСКАЯ ОШИБКА КАРТЫ: ${err.message}`);
        }

        let userCoords = { lat: 59.9451, lng: 30.3541 };

        log("Запрашиваю геопозицию GPS...");
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    userCoords = { lat: position.coords.latitude, lng: position.coords.longitude };
                    log(`GPS НАЙДЕН: ${userCoords.lat.toFixed(4)}, ${userCoords.lng.toFixed(4)}`);
                    map.setView([userCoords.lat, userCoords.lng], 16);
                    L.marker([userCoords.lat, userCoords.lng]).addTo(map).bindPopup('Вы здесь').openPopup();
                },
                (error) => {
                    log(`ОШИБКА GPS: Код ${error.code} - ${error.message}`);
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        } else {
            log("Браузер вообще не поддерживает navigator.geolocation");
        }

        // Отладочный обработчик кнопки ПОСТАВИТЬ
        window.dropPinDebug = function() {
            log("Клик по кнопке ПОСТАВИТЬ зафиксирован!");
            
            const data = {
                action: "set_pin",
                lat: userCoords.lat,
                lng: userCoords.lng,
                duration: 60
            };
            
            const jsonStr = JSON.stringify(data);
            log(`Пакет готов: ${jsonStr}`);

            if (tg && tg.sendData) {
                log("Вызываю метод tg.sendData()...");
                try {
                    tg.sendData(jsonStr);
                    log("tg.sendData отработал без падения скрипта.");
                } catch(e) {
                    log(`ОШИБКА ОТПРАВКИ ТГ: ${e.message}`);
                }
            } else {
                log("Ошибка: tg.sendData недоступен (WebApp запущен не в режиме клавиатуры)");
            }
        };

        // Отладочный обработчик кнопки УДАЛИТЬ
        window.deletePinDebug = function() {
            log("Клик по кнопке УДАЛИТЬ зафиксирован!");
            const data = { action: "delete_pin" };
            const jsonStr = JSON.stringify(data);

            if (tg && tg.sendData) {
                log("Вызываю tg.sendData для удаления...");
                tg.sendData(jsonStr);
            } else {
                log("Ошибка: tg.sendData недоступен!");
            }
        };

        setTimeout(() => { map.invalidateSize(); }, 400);
    </script>
</body>
</html>
