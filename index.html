<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drinderr Map Radar</title>
    
    <!-- Подключаем ваши локальные стили (статус 200 OK) -->
    <link rel="stylesheet" href="leaflet.css" />
    
    <!-- Подключаем ваш локальный скрипт Telegram (статус 200 OK) -->
    <script src="telegram.js"></script>
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #17212b;
            color: #f5f5f5;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        #map {
            width: 100%;
            height: calc(100vh - 90px);
            background-color: #2b2b2b;
        }

        /* Полностью скрываем плашку копирайта в углу экрана */
        .leaflet-control-attribution { display: none !important; }
        
        /* Нижняя панель управления радаром */
        .controls {
            height: 90px;
            padding: 12px 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #202b36;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.3);
            box-sizing: border-box;
            z-index: 1000;
        }

        .panel-row {
            display: flex;
            gap: 10px;
            width: 100%;
            align-items: center;
        }

        label {
            font-size: 14px;
            color: #b0b9c2;
            white-space: nowrap;
        }

        select {
            flex: 1;
            padding: 6px;
            border-radius: 8px;
            background: #17212b;
            color: #fff;
            border: 1px solid #455261;
            font-size: 14px;
            outline: none;
        }
        
        button.pin-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            background: linear-gradient(135deg, #2481cc, #1a65a4);
            color: #ffffff;
            transition: transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        button.pin-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <!-- Поле интерактивной карты -->
    <div id="map"></div>

    <!-- Панель управления под картой -->
    <div class="controls">
        <div class="panel-row">
            <label for="duration">Время жизни пина:</label>
            <select id="duration">
                <option value="60">1 час</option>
                <option value="180">3 часа</option>
                <option value="720">12 часов</option>
                <option value="1440">24 часа</option>
            </select>
        </div>
        <button class="pin-btn" onclick="dropPin()">📍 Поставить пин здесь</button>
    </div>

    <!-- Подключаем локальный движок карты, который вы успешно скачали (статус 200 OK) -->
    <script src="leaflet.js"></script>
    <script>
        // Инициализируем Telegram
        let tg = null;
        if (typeof window !== 'undefined' && window.Telegram && window.Telegram.WebApp) {
            tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
        }

        let map, userCoords = { lat: 55.7558, lng: 37.6173 };

        // Инициализация карты из локального скрипта
        map = L.map('map').setView([userCoords.lat, userCoords.lng], 12);
        
        // Подгружаем тайлы OpenStreetMap напрямую (Тайлы-изображения никогда не блокируются защитой ORB)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19
        }).addTo(map);

        // Текстовая иконка-эмодзи, чтобы избежать 404 ошибок для картинок
        const iconMarker = L.divIcon({
            html: '<div style="font-size: 30px; transform: translate(-10px, -20px);">📍</div>',
            className: 'custom-div-icon'
        });

        // Запрашиваем реальный GPS смартфона
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((position) => {
                userCoords = { lat: position.coords.latitude, lng: position.coords.longitude };
                map.setView([userCoords.lat, userCoords.lng], 15);
                L.marker([userCoords.lat, userCoords.lng], { icon: iconMarker }).addTo(map)
                    .bindPopup('Ваш радар настроен').openPopup();
            }, (error) => {
                L.marker([userCoords.lat, userCoords.lng], { icon: iconMarker }).addTo(map)
                    .bindPopup('GPS отключен').openPopup();
            }, { enableHighAccuracy: true });
        }

        // Логика отображения активных пинов друзей (передаются из Telegram при запуске)
        if (tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param) {
            try {
                let friendsPins = JSON.parse(atob(tg.initDataUnsafe.start_param));
                friendsPins.forEach(p => {
                    let friendIcon = L.divIcon({
                        html: `<div style="font-size: 30px; transform: translate(-10px, -20px);">👤</div>`,
                        className: 'custom-div-icon'
                    });
                    L.marker([p.lat, p.lng], { icon: friendIcon }).addTo(map)
                        .bindPopup(`<b>Пользователь:</b> ${p.name}<br><b>Активен до:</b> ${p.until}`);
                });
            } catch(e) {}
        }

        // Функция отправки данных чекина в чат-бот при клике на кнопку
        window.dropPin = function() {
            const minutes = document.getElementById('duration').value;
            const data = {
                action: "set_pin",
                lat: userCoords.lat,
                lng: userCoords.lng,
                duration: parseInt(minutes)
            };
            
            if (tg && tg.sendData) {
                tg.sendData(JSON.stringify(data));
                tg.close();
            } else {
                alert("Локальный тест:\nПин установлен на " + minutes + " мин.\nКоординаты: " + JSON.stringify(userCoords));
            }
        };
        
        // Корректировка размеров контейнера карты под WebView Telegram
        setTimeout(() => { map.invalidateSize(); }, 400);
    </script>
</body>
</html>
